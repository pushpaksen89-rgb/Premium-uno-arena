<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO Royale — Premium Real-time Arena</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg-main: #0a0a12;
            --panel-bg: rgba(25, 25, 38, 0.6);
            --glow-red: #ff4757;
            --glow-blue: #2e86de;
            --glow-green: #2ed573;
            --glow-yellow: #ffa502;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', system-ui, sans-serif; }
        
        body {
            background: radial-gradient(circle at center, #1e1e2f 0%, var(--bg-main) 100%);
            color: #f1f2f6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Luxury Setup Login Window */
        .auth-card {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.6s ease-out;
        }

        .auth-card h1 {
            font-size: 2.2rem;
            background: linear-gradient(45deg, #ff4757, #ffa502);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            letter-spacing: 1.5px;
        }

        .auth-card input {
            width: 100%;
            padding: 14px 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #313244;
            background: rgba(10,10,18,0.8);
            color: #fff;
            font-size: 1rem;
            transition: 0.3s;
        }

        .auth-card input:focus { border-color: var(--glow-red); outline: none; box-shadow: 0 0 10px rgba(255,71,87,0.3); }

        .auth-card button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255,71,87,0.4);
            transition: 0.2s;
        }

        .auth-card button:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(255,71,87,0.6); }

        /* Real-Time Game Board Layout */
        .board-layout { display: none; width: 100%; max-width: 1200px; padding: 20px; animation: fadeIn 0.5s ease; }
        
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-bg);
            padding: 15px 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .active-pulse { color: #2ed573; font-weight: bold; text-shadow: 0 0 10px rgba(46,213,115,0.4); }

        /* Central Arena Pile Displays */
        .arena { display: flex; justify-content: center; align-items: center; gap: 60px; margin: 40px 0; }
        
        .deck-btn, .active-discard {
            width: 120px;
            height: 180px;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            font-size: 1.1rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .deck-btn {
            background: linear-gradient(135deg, #1e1e30 0%, #0f0f1a 100%);
            border: 2px dashed rgba(255,255,255,0.2);
            cursor: pointer;
            color: #aaa;
        }
        .deck-btn:hover { transform: scale(1.05); border-color: #fff; color: #fff; }

        /* Elite Card Design Styles */
        .card {
            width: 100px;
            height: 150px;
            border-radius: 14px;
            border: 2px solid rgba(255,255,255,0.8);
            display: inline-flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: all 0.25s ease;
            user-select: none;
            position: relative;
        }
        .card:hover { transform: translateY(-20px) rotate(2deg); z-index: 100; box-shadow: 0 20px 30px rgba(0,0,0,0.5); }

        .red { background: linear-gradient(135deg, #ff3838, #ff4d4d); box-shadow: 0 0 15px rgba(255,56,56,0.3); }
        .blue { background: linear-gradient(135deg, #1770ff, #00d2ff); box-shadow: 0 0 15px rgba(23,112,255,0.3); }
        .green { background: linear-gradient(135deg, #05c46b, #0be881); box-shadow: 0 0 15px rgba(5,196,107,0.3); }
        .yellow { background: linear-gradient(135deg, #ffa801, #ffd32a); color: #000; box-shadow: 0 0 15px rgba(255,168,1,0.3); }
        .wild { background: linear-gradient(135deg, #3d3d3d, #1e272e); border-color: #555; }

        .hand-rack {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 30px;
            min-height: 220px;
            display: flex;
            gap: 15px;
            overflow-x: auto;
            align-items: center;
        }

        /* Secret God Mode Control Board (Stealth View) */
        .god-panel {
            margin-top: 40px;
            background: linear-gradient(135deg, rgba(255,71,87,0.1) 0%, rgba(10,10,18,0.9) 100%);
            border: 1px dashed var(--glow-red);
            padding: 25px;
            border-radius: 20px;
            display: none;
        }

        .god-grid { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 15px; }
        .god-btn { background: #ff4757; color: white; border: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .god-btn:hover { background: #ff6b81; box-shadow: 0 0 12px var(--glow-red); }

        .player-row { background: rgba(255,255,255,0.04); padding: 10px 20px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="authContainer" class="auth-card">
        <h1>UNO ROYALE</h1>
        <input type="text" id="usernameInput" placeholder="Enter Nickname...">
        <input type="password" id="accessPass" placeholder="Access Authentication Pin (Optional)">
        <button onclick="joinMatchmaking()">Enter Arena</button>
    </div>

    <div id="boardLayout" class="board-layout">
        <div class="header-bar">
            <h2 id="turnDisplay" class="active-pulse">Awaiting Competitors...</h2>
            <div id="roomRegistry" style="font-size: 0.95rem; color: #aaa;"></div>
        </div>

        <div id="trackedOpponents" style="margin-bottom: 25px;"></div>

        <div class="arena">
            <div class="deck-btn" onclick="drawFromDeck()">🎴<br>DRAW</div>
            <div id="tableDiscard" class="active-discard"></div>
        </div>

        <h3 style="margin-bottom: 15px; letter-spacing: 1px; font-size: 1rem; color: #888;">YOUR CARD SECTOR</h3>
        <div id="playerHandRack" class="hand-rack"></div>

        <div id="hostTerminal" class="god-panel">
            <h3 style="color: #ff4757;">⚡ HOST ENGINE MATRIX OVERRIDE ACTIVATED</h3>
            <div class="god-grid">
                <button class="god-btn" onclick="fireHostAction('STACK_MY_DECK')">🃏 Stack Hand (+3 Wilds)</button>
                <button class="god-btn" style="background:#2e86de;" onclick="fireHostAction('HIJACK_TURN')">⏳ Seize Current Turn</button>
                <div style="display:flex; gap:5px; align-items:center;">
                    <input type="text" id="sabotageTarget" placeholder="Target Network ID" style="padding:8px; border-radius:6px; background:#111; color:#fff; border:1px solid #444; width:160px; margin:0;">
                    <button class="god-btn" style="background:#ffa502; color:#000;" onclick="fireHostAction('SABOTAGE_PLAYER')">💥 Smite (Give +4)</button>
                    <button class="god-btn" style="background:#57606f;" onclick="fireHostAction('NUKE_HAND')">☢️ Wipe Cards</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let socket;
        let selfId;

        function joinMatchmaking() {
            socket = io();
            const name = document.getElementById('usernameInput').value || "Elite Duelist";
            const pass = document.getElementById('accessPass').value;

            socket.emit('joinGame', { name: name, isHostSecret: pass });

            // Reveal God system panel locally if correct pass is input
            if(pass === "ADMIN_GOD_MODE") {
                document.getElementById('hostTerminal').style.display = 'block';
            }

            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('boardLayout').style.display = 'block';

            bindNetworkEvents();
        }

        function bindNetworkEvents() {
            selfId = socket.id;

            socket.on('stateUpdate', (state) => {
                selfId = socket.id; // Maintain structural lock
                
                // Update active game notification text
                const activeUser = state.players[state.currentTurn];
                document.getElementById('turnDisplay').innerText = activeUser ? `CURRENT TURN: ${activeUser.name.toUpperCase()}` : "LOBBY RECONSTRUCTING...";

                // Handle table discard render
                const disc = document.getElementById('tableDiscard');
                disc.innerHTML = '';
                if(state.discardPile.length > 0) {
                    const top = state.discardPile[state.discardPile.length - 1];
                    disc.className = `active-discard ${top.color}`;
                    disc.innerHTML = `<div>${top.value}</div>`;
                }

                // Render Live Player Registry & Peek Opponent Hands if you are host
                const oppContainer = document.getElementById('trackedOpponents');
                const registry = document.getElementById('roomRegistry');
                oppContainer.innerHTML = '';
                registry.innerHTML = '';

                let isHostSelf = state.players[selfId] ? state.players[selfId].isHost : false;

                Object.keys(state.players).forEach(id => {
                    const p = state.players[id];
                    registry.innerHTML += ` • ${p.name} [${p.hand.length} Cards]`;

                    if(id !== selfId) {
                        const row = document.createElement('div');
                        row.className = 'player-row';
                        
                        // If host, render their exact cards in tiny text to spy on them
                        let cardInsight = '';
                        if(isHostSelf) {
                            cardInsight = `<span style="color:#ffa502; font-size:0.85rem; margin-right:15px;">🔍 Cards: ${p.hand.map(c => c.value).join(', ')}</span>`;
                        }

                        row.innerHTML = `<div><strong>${p.name}</strong> <span style="color:#666; font-size:0.8rem;">(ID: ${p.id})</span></div>
                                         <div>${cardInsight}<span class="active-pulse" style="color:#ff4757;">${p.hand.length} in hand</span></div>`;
                        oppContainer.appendChild(row);
                    }
                });

                // Render Client User Card Collection
                const rack = document.getElementById('playerHandRack');
                rack.innerHTML = '';
                const myData = state.players[selfId];
                if(myData && myData.hand) {
                    myData.hand.forEach(card => {
                        const div = document.createElement('div');
                        div.className = `card ${card.color}`;
                        div.innerHTML = `<div>${card.value}</div><div style="text-align:right; font-size:1.5rem; margin-top:auto;">${card.value[0]}</div>`;
                        div.onclick = () => socket.emit('playCard', { cardId: card.id });
                        rack.appendChild(div);
                    });
                }
            });
        }

        function drawFromDeck() { socket.emit('drawCard'); }

        // Trigger Hidden Exploits
        function fireHostAction(type) {
            socket.emit('hostCommand', {
                action: type,
                targetId: document.getElementById('sabotageTarget').value,
                data: {}
            });
        }
    </script>
</body>
</html>
