<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO Royale Arena</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            background-color: #0a0a12;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .auth-card {
            background: #141423;
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        h1 { color: #ff4757; margin-bottom: 5px; }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
            box-sizing: border-box;
        }
        input { background: #202038; color: white; }
        button {
            background: #2ed573;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #26af5f; }
        #gameArea { display: none; }
        .hand { display: flex; justify-content: center; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .card {
            padding: 20px 15px;
            border-radius: 8px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            min-width: 60px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .card:hover { transform: translateY(-5px); }
        .Red { background: #ff4757; }
        .Blue { background: #2ed573; }
        .Yellow { background: #ffa502; }
        .Green { background: #1e90ff; }
        .Wild { background: #747d8c; }
        #topCardDisplay {
            display: inline-block;
            font-size: 1.5rem;
            padding: 40px 30px;
            margin: 20px;
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <div id="authContainer" class="auth-card">
        <h1>UNO ROYALE</h1>
        <p style="color: #888; font-size: 0.9rem; margin-top: -15px; margin-bottom: 25px; font-style: italic;">Created by Pushp</p>
        
        <input type="text" id="usernameInput" placeholder="Enter Nickname...">
        <button onclick="login()">Enter Arena</button>
    </div>

    <div id="gameArea">
        <h2 id="turnIndicator">Waiting for host to start...</h2>
        <button id="startBtn" onclick="startGame()" style="max-width: 200px; display: none;">Start Match</button>
        
        <div>
            <h3>Discard Pile (Top Card):</h3>
            <div id="topCardDisplay">--</div>
        </div>

        <button onclick="drawCard()" style="max-width: 200px; background: #ffa502;">Draw Card</button>

        <h3>Your Cards:</h3>
        <div id="handDisplay" class="hand"></div>
    </div>

    <script>
        const socket = io();
        let myId = null;

        socket.on('connect', () => {
            myId = socket.id;
        });

        function login() {
            const name = document.getElementById('usernameInput').value;
            if(!name) return alert('Please enter a nickname!');
            
            socket.emit('joinGame', name);
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('gameArea').style.display = 'block';
        }

        socket.on('updatePlayers', (playerList) => {
            // If you are the first player in the lobby room, you get the Start Button
            if(playerList.length >= 2) {
                document.getElementById('startBtn').style.display = 'inline-block';
            }
        });

        function startGame() {
            socket.emit('startGameSignal');
            document.getElementById('startBtn').style.display = 'none';
        }

        socket.on('gameStateUpdate', (data) => {
            // Update Turn tracking text
            const indicator = document.getElementById('turnIndicator');
            if(data.isYourTurn) {
                indicator.innerText = "YOUR TURN! Play a matching card.";
                indicator.style.color = "#2ed573";
            } else {
                indicator.innerText = `${data.currentTurnName}'s Turn...`;
                indicator.style.color = "#ffffff";
            }

            // Update Top Played Card Display
            const topCardDiv = document.getElementById('topCardDisplay');
            topCardDiv.innerText = `${data.topCard.color} ${data.topCard.value}`;
            topCardDiv.className = `card ${data.topCard.color}`;

            // Render player cards
            const handDiv = document.getElementById('handDisplay');
            handDiv.innerHTML = '';
            data.yourHand.forEach((card, index) => {
                const cardEl = document.createElement('div');
                cardEl.className = `card ${card.color}`;
                cardEl.innerText = card.value;
                cardEl.onclick = () => playCard(index);
                handDiv.appendChild(cardEl);
            });
        });

        function playCard(index) {
            socket.emit('playCardRequest', index);
        }

        function drawCard() {
            socket.emit('drawCardRequest');
        }

        socket.on('errorAlert', (msg) => {
            alert(msg);
        });

        socket.on('gameOverEvent', (msg) => {
            alert(msg);
            location.reload();
        });
    </script>
</body>
</html>
